---
layout: default
title: "Blog - Justin Chen"
description: "Thoughts on life, technology, and building things."
---

<main class="blog-list-wrapper">
  <h2>Blog</h2>
  <p class="blog-subtitle">Thoughts on life, technology, and building things.</p>

  <div class="blog-timeline">
    {% for post in site.posts %}
    <a href="{{ post.url | relative_url }}" class="blog-entry">
      <time>{{ post.date | date: "%Y-%m-%d" }}</time>
      <div class="blog-entry-content">
        <h3>{{ post.title }}</h3>
        <p>{{ post.description }}</p>
      </div>
    </a>
    {% endfor %}
  </div>
</main>
