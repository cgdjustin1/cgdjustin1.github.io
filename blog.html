---
layout: default
title: "Blog - Justin Chen"
description: "Justin Chen's Blog"
---

<main>
  <h2>My Blog</h2>

  <div class="blog-container">
    {% for post in site.posts %}
    <div class="blog-card">
      <h3>{{ post.title }}</h3>
      <p>{{ post.description }}</p>
      <a href="{{ post.url | relative_url }}">Read More</a>
    </div>
    {% endfor %}
  </div>
</main>
