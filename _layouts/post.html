---
layout: default
---
<main class="article-wrapper">
  <header class="blog-header">
    <h1>{{ page.title }}</h1>
    <p class="author">{{ page.author | default: "Justin Chen" }}</p>
    <p class="date">{{ page.date | date: "%B %d, %Y" }} · {% assign words = content | number_of_words %}{% if words < 250 %}1{% else %}{{ words | divided_by: 250 }}{% endif %} min read</p>
  </header>

  <article class="post">
    {{ content }}
  </article>

  <div class="back-link">
    <a href="{{ '/blog/' | relative_url }}">← Back to Blog</a>
  </div>
</main>
