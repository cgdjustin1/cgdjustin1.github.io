---
layout: default
---
<main class="article-wrapper">
  <header class="blog-header">
    <h1>{{ page.title }}</h1>
    <p class="author">{{ page.author | default: "Justin Chen" }}</p>
    <p class="date">{{ page.date | date: "%Y-%m-%d" }}</p>
  </header>

  <article class="post">
    {{ content }}
  </article>

  <div class="back-link">
    <a href="{{ '/blog.html' | relative_url }}">&larr; Back to Blog</a>
  </div>
</main>
